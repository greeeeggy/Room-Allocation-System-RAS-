name: room_availability_app
description: "Engineering Building Room Availability Monitoring System"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.0.0

  # Date/time
  intl: ^0.19.0

  # Calendar
  table_calendar: ^3.1.0

  # Image loading
  cached_network_image: ^3.3.1

  # Lost & Found
  image_picker: ^1.1.2
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
